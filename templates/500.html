<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server error — KwaCart</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f8fafc;
            color: #222;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        nav {
            background: #f5f0ff;
            padding: 0.75rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            border-bottom: 1px solid #e2d9f3;
        }
        nav a {
            color: #5D3A9B;
            text-decoration: none;
            font-weight: 600;
        }
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4rem 1rem;
        }
        .error-box {
            text-align: center;
            max-width: 38rem;
        }
        .error-code {
            font-size: 5rem;
            margin: 0;
            line-height: 1;
            color: #5D3A9B;
        }
        h1 {
            margin: 0.5rem 0 1rem;
            font-size: 1.75rem;
        }
        p {
            color: #64748b;
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        .btn {
            display: inline-block;
            padding: 0.5rem 1.25rem;
            border: 1px solid #5D3A9B;
            border-radius: 6px;
            color: #5D3A9B;
            background: #fff;
            text-decoration: none;
            font-size: 0.95rem;
            font-family: inherit;
        }
        .btn-primary {
            background: #5D3A9B;
            color: #fff;
        }
        .btn-group {
            display: flex;
            gap: 0.75rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        footer {
            padding: 1rem 1.5rem;
            text-align: center;
            font-size: 0.85rem;
            color: #64748b;
            border-top: 1px solid #e2e8f0;
        }
    </style>
</head>
<body>
    <nav>
        <a href="/">KwaCart</a>
    </nav>

    <main>
        <div class="error-box">
            <p class="error-code" aria-hidden="true">500</p>
            <h1>Something went wrong</h1>
            <p>
                An unexpected error occurred on our end.<br>
                Please try again in a moment, or go back to the home page.
            </p>
            <div class="btn-group">
                <a href="/" class="btn btn-primary">Go to home page</a>
                <a href="/accounts/login/" class="btn">Log in</a>
            </div>
        </div>
    </main>

    <footer>
        KwaCart &mdash; a Liberating Structures facilitation platform.
    </footer>
</body>
</html>
