{% extends "base.html" %}

{% block title %}Sign up{% endblock %}

{% block content %}
<h1>Sign up</h1>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Create account</button>
</form>
<p>Already have an account? <a href="{% url 'accounts:login' %}">Log in</a></p>
{% endblock %}
