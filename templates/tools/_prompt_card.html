<div class="prompt-card">
    <div class="prompt-card-header">
        <h3>{{ title }}</h3>
    </div>
    <p class="prompt-use">{{ use }}</p>
    <textarea class="prompt-textarea" readonly>{{ prompt }}</textarea>
    <div class="prompt-footer">
        <button class="copy-btn" type="button">Copy</button>
    </div>
</div>
