{% if tool_meta.phases or tool_meta.timer_seconds %}
{% if tool_meta.phases %}{{ tool_meta.phases|json_script:"phase-data" }}{% endif %}
<div class="timer-widget"
     data-duration="{{ tool_meta.timer_seconds|default:0 }}"
     {% if timer_session_id %}
     data-status-url="{% url 'tools:session_status' timer_session_id %}"
     data-timer-start-url="{% url 'tools:timer_start' timer_session_id %}"
     data-timer-reset-url="{% url 'tools:timer_reset' timer_session_id %}"
     {% endif %}>
    {% if tool_meta.phases %}
    <div class="timer-phase-info">
        <span class="timer-phase-label"></span>
        <span class="timer-phase-progress"></span>
    </div>
    {% endif %}
    <div class="timer-display">--:--</div>
    {% if not timer_session_id %}
    <div class="timer-controls">
        <button type="button" class="btn timer-start">Start</button>
        <button type="button" class="btn timer-pause" disabled>Pause</button>
        <button type="button" class="btn timer-reset">Reset</button>
    </div>
    {% elif is_host %}
    <div class="timer-controls">
        <button type="button" class="btn timer-start">Start</button>
        <button type="button" class="btn timer-reset">Reset</button>
    </div>
    {% endif %}
</div>
<style>
    .timer-widget {
        display: flex; align-items: center; gap: 0.75rem;
        padding: 0.6rem 0.9rem; border: 1px solid #e2e8f0;
        border-radius: 6px; background: #f8fafc; margin: 0.5rem 0 1rem;
        flex-wrap: wrap;
    }
    .timer-phase-info {
        display: flex; flex-direction: column; gap: 0.15rem;
        min-width: 14rem;
    }
    .timer-phase-label {
        font-weight: 600; color: #1e40af; font-size: 0.95rem;
        transition: background 0.3s;
    }
    .timer-phase-label.phase-flash {
        background: #fef9c3; border-radius: 3px; padding: 0 0.2rem;
    }
    .timer-phase-progress {
        font-size: 0.78rem; color: #64748b;
    }
    .timer-display {
        font-family: ui-monospace, Menlo, monospace; font-size: 1.4rem;
        min-width: 4ch; color: #2a4d69; font-weight: 600;
    }
    .timer-display.warning { color: #b45309; }
    .timer-display.expired { color: #b91c1c; }
    .timer-controls { display: flex; gap: 0.4rem; }
</style>
<script>
(function () {
    const widget = document.querySelector('.timer-widget');
    if (!widget) return;
    const display = widget.querySelector('.timer-display');
    const startBtn = widget.querySelector('.timer-start');
    const pauseBtn = widget.querySelector('.timer-pause');
    const resetBtn = widget.querySelector('.timer-reset');
    let intervalId = null;

    const statusUrl = widget.dataset.statusUrl || null;
    const timerStartUrl = widget.dataset.timerStartUrl || null;
    const timerResetUrl = widget.dataset.timerResetUrl || null;
    const sessionMode = !!statusUrl;

    function fmt(s) {
        const m = Math.floor(s / 60);
        const sec = s % 60;
        return String(m).padStart(2, '0') + ':' + String(sec).padStart(2, '0');
    }

    function beep(frequency, duration, count) {
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            for (let i = 0; i < (count || 1); i++) {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.frequency.value = frequency || 880;
                const start = ctx.currentTime + i * (duration || 0.4) * 1.4;
                gain.gain.setValueAtTime(0.25, start);
                gain.gain.exponentialRampToValueAtTime(0.001, start + (duration || 0.4));
                osc.start(start);
                osc.stop(start + (duration || 0.4));
            }
        } catch (e) {}
    }

    function getCsrf() {
        const val = '; ' + document.cookie;
        const parts = val.split('; csrftoken=');
        if (parts.length === 2) return parts.pop().split(';').shift();
        return '';
    }

    async function postJson(url) {
        const resp = await fetch(url, {
            method: 'POST',
            credentials: 'same-origin',
            headers: { 'X-CSRFToken': getCsrf(), 'Content-Type': 'application/json' },
        });
        return resp.json();
    }

    const phaseDataEl = document.getElementById('phase-data');
    const phases = phaseDataEl ? JSON.parse(phaseDataEl.textContent) : null;

    if (phases && phases.length) {
        const phaseLabel = widget.querySelector('.timer-phase-label');
        const phaseProgress = widget.querySelector('.timer-phase-progress');
        let phaseIdx = 0;
        let remaining = phases[0].seconds;

        function totalSeconds() {
            return phases.reduce((s, p) => s + p.seconds, 0);
        }

        function resetToInitial() {
            clearInterval(intervalId); intervalId = null;
            phaseIdx = 0;
            remaining = phases[0].seconds;
            if (startBtn) { startBtn.disabled = false; startBtn.textContent = 'Start'; }
            renderPhase();
        }

        function updateProgressText() {
            if (phaseProgress) phaseProgress.textContent = 'Phase ' + (phaseIdx + 1) + ' of ' + phases.length;
        }

        function renderPhase() {
            const phase = phases[phaseIdx];
            if (phaseLabel) phaseLabel.textContent = phase.label;
            updateProgressText();
            display.textContent = fmt(remaining);
            const isLastPhase = phaseIdx === phases.length - 1;
            display.classList.toggle('warning', remaining > 0 && remaining <= 10);
            display.classList.toggle('expired', remaining === 0 && isLastPhase);
        }

        function flashLabel() {
            if (!phaseLabel) return;
            phaseLabel.classList.add('phase-flash');
            setTimeout(() => phaseLabel.classList.remove('phase-flash'), 1200);
        }

        function tick() {
            if (remaining > 0) {
                remaining -= 1;
                renderPhase();
            }
            if (remaining === 0) {
                if (phaseIdx < phases.length - 1) {
                    phaseIdx += 1;
                    remaining = phases[phaseIdx].seconds;
                    beep(880, 0.35, 1);
                    flashLabel();
                    renderPhase();
                } else {
                    clearInterval(intervalId); intervalId = null;
                    if (startBtn) { startBtn.disabled = false; startBtn.textContent = 'Start'; }
                    beep(660, 0.4, 2);
                    renderPhase();
                }
            }
        }

        function applyServerTimestamp(timerStartedAt) {
            if (!timerStartedAt) {
                resetToInitial();
                return;
            }
            const elapsedSec = Math.floor((Date.now() - new Date(timerStartedAt).getTime()) / 1000);
            let acc = 0;
            let newPhaseIdx = phases.length - 1;
            let newRemaining = 0;
            for (let i = 0; i < phases.length; i++) {
                if (elapsedSec < acc + phases[i].seconds) {
                    newPhaseIdx = i;
                    newRemaining = phases[i].seconds - (elapsedSec - acc);
                    break;
                }
                acc += phases[i].seconds;
            }
            phaseIdx = newPhaseIdx;
            remaining = newRemaining;
            renderPhase();
            if (remaining > 0 && !intervalId) {
                intervalId = setInterval(tick, 1000);
                if (startBtn) { startBtn.disabled = true; startBtn.textContent = 'Running…'; }
            } else if (remaining === 0 && intervalId) {
                clearInterval(intervalId); intervalId = null;
                if (startBtn) { startBtn.disabled = false; startBtn.textContent = 'Start'; }
            }
        }

        if (sessionMode) {
            async function pollTimerState() {
                try {
                    const data = await fetch(statusUrl, { credentials: 'same-origin' }).then(r => r.json());
                    applyServerTimestamp(data.timer_started_at);
                } catch (e) {}
            }
            pollTimerState();
            setInterval(pollTimerState, 4000);
        }

        if (startBtn) {
            startBtn.addEventListener('click', async () => {
                if (intervalId) return;
                if (phaseIdx >= phases.length - 1 && remaining === 0) {
                    phaseIdx = 0;
                    remaining = phases[0].seconds;
                    renderPhase();
                }
                if (sessionMode) {
                    try {
                        const data = await postJson(timerStartUrl);
                        if (data.timer_started_at) {
                            applyServerTimestamp(data.timer_started_at);
                            return;
                        }
                    } catch (e) {}
                }
                intervalId = setInterval(tick, 1000);
                if (startBtn) { startBtn.disabled = true; startBtn.textContent = 'Running…'; }
                if (pauseBtn) pauseBtn.disabled = false;
            });
        }

        if (pauseBtn) {
            pauseBtn.addEventListener('click', () => {
                if (!intervalId) return;
                clearInterval(intervalId); intervalId = null;
                if (startBtn) { startBtn.disabled = false; startBtn.textContent = 'Resume'; }
                pauseBtn.disabled = true;
            });
        }

        if (resetBtn) {
            resetBtn.addEventListener('click', async () => {
                resetToInitial();
                if (sessionMode) {
                    try { await postJson(timerResetUrl); } catch (e) {}
                }
            });
        }

        renderPhase();

    } else {
        const total = parseInt(widget.dataset.duration, 10) || 60;
        let remaining = total;

        function resetToInitial() {
            clearInterval(intervalId); intervalId = null;
            remaining = total;
            if (startBtn) { startBtn.disabled = false; startBtn.textContent = 'Start'; }
            if (pauseBtn) pauseBtn.disabled = true;
            render();
        }

        function render() {
            display.textContent = fmt(remaining);
            display.classList.toggle('warning', remaining > 0 && remaining <= 10);
            display.classList.toggle('expired', remaining === 0);
        }

        function tick() {
            if (remaining > 0) { remaining -= 1; render(); }
            if (remaining === 0) {
                clearInterval(intervalId); intervalId = null;
                if (startBtn) { startBtn.disabled = false; startBtn.textContent = 'Start'; }
                if (pauseBtn) pauseBtn.disabled = true;
            }
        }

        function applyServerTimestamp(timerStartedAt) {
            if (!timerStartedAt) {
                resetToInitial();
                return;
            }
            const elapsedSec = Math.floor((Date.now() - new Date(timerStartedAt).getTime()) / 1000);
            remaining = Math.max(0, total - elapsedSec);
            render();
            if (remaining > 0 && !intervalId) {
                intervalId = setInterval(tick, 1000);
                if (startBtn) { startBtn.disabled = true; startBtn.textContent = 'Running…'; }
            }
        }

        if (sessionMode) {
            async function pollTimerState() {
                try {
                    const data = await fetch(statusUrl, { credentials: 'same-origin' }).then(r => r.json());
                    applyServerTimestamp(data.timer_started_at);
                } catch (e) {}
            }
            pollTimerState();
            setInterval(pollTimerState, 4000);
        }

        if (startBtn) {
            startBtn.addEventListener('click', async () => {
                if (intervalId) return;
                if (remaining === 0) remaining = total;
                if (sessionMode) {
                    try {
                        const data = await postJson(timerStartUrl);
                        if (data.timer_started_at) {
                            applyServerTimestamp(data.timer_started_at);
                            return;
                        }
                    } catch (e) {}
                }
                intervalId = setInterval(tick, 1000);
                if (startBtn) { startBtn.disabled = true; startBtn.textContent = 'Running…'; }
                if (pauseBtn) pauseBtn.disabled = false;
            });
        }

        if (pauseBtn) {
            pauseBtn.addEventListener('click', () => {
                if (!intervalId) return;
                clearInterval(intervalId); intervalId = null;
                if (startBtn) { startBtn.disabled = false; startBtn.textContent = 'Resume'; }
                if (pauseBtn) pauseBtn.disabled = true;
            });
        }

        if (resetBtn) {
            resetBtn.addEventListener('click', async () => {
                resetToInitial();
                if (sessionMode) {
                    try { await postJson(timerResetUrl); } catch (e) {}
                }
            });
        }

        render();
    }
})();
</script>
{% endif %}
