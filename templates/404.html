{% extends "base.html" %}

{% block title %}Page not found — KwaCart{% endblock %}

{% block content %}
<div style="text-align:center; padding:4rem 1rem; max-width:38rem; margin:0 auto;">
    <p style="font-size:5rem; margin:0; line-height:1; color:#5D3A9B;" aria-hidden="true">404</p>
    <h1 style="margin:0.5rem 0 1rem;">Page not found</h1>
    <p style="color:#64748b; margin-bottom:2rem;">
        The page you were looking for doesn&rsquo;t exist or has been moved.
    </p>
    <div style="display:flex; gap:0.75rem; justify-content:center; flex-wrap:wrap;">
        <a href="{% url 'home' %}" class="btn btn-primary">Go to home page</a>
        {% if request.user.is_authenticated %}
            <a href="{% url 'tools:catalog' %}" class="btn">All tools</a>
            <a href="{% url 'archive:dashboard' %}" class="btn">My archive</a>
        {% endif %}
    </div>
</div>
{% endblock %}
