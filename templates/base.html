<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Well-Served{% endblock %}</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
               max-width: 960px; margin: 2rem auto; padding: 0 1.5rem; color: #222; }
        nav { display: flex; gap: 1rem; align-items: center; padding-bottom: 1rem;
              border-bottom: 1px solid #e2e8f0; margin-bottom: 1.5rem; }
        nav a { color: #5D3A9B; text-decoration: none; }
        nav .spacer { flex: 1; }
        .messages li { list-style: none; background: #f5f0ff; border: 1px solid #d4b8f0;
                       padding: 0.5rem 0.75rem; border-radius: 4px; margin: 0.25rem 0; }
        .btn { display: inline-block; padding: 0.4rem 0.8rem; border-radius: 4px;
               border: 1px solid #5D3A9B; color: #5D3A9B; text-decoration: none; background: #fff; }
        .btn-primary { background: #5D3A9B; color: #fff; }
        .tool-grid { display: grid; gap: 1rem; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); }
        .tool-card { padding: 1rem; border: 1px solid #e2e8f0; border-radius: 6px; background: #f8fafc; }
    </style>
</head>
<body>
    <nav>
        <a href="/"><strong>Well-Served</strong></a>
        {% if request.user.is_authenticated %}
            <a href="{% url 'tools:catalog' %}">All Tools</a>
            <a href="{% url 'archive:dashboard' %}">My Archive</a>
            <span class="spacer"></span>
            <span>{{ request.user.email }}</span>
            <form method="post" action="{% url 'accounts:logout' %}" style="display:inline">
                {% csrf_token %}
                <button type="submit" class="btn">Logout</button>
            </form>
        {% else %}
            <a href="/about/">About</a>
            <span class="spacer"></span>
            <a href="{% url 'accounts:login' %}">Login</a>
            <a href="{% url 'accounts:signup' %}">Sign up</a>
        {% endif %}
    </nav>

    {% if messages %}
        <ul class="messages">
            {% for m in messages %}<li>{{ m }}</li>{% endfor %}
        </ul>
    {% endif %}

    {% block content %}{% endblock %}
</body>
</html>
